<!DOCTYPE html>
<html>
<head>

    body { font-family: sans-serif; background: #e5ded1; padding: 20px; }

    img { max-width: 100%; height: 200px; object-fit: contain; }
    h3 { margin: 10px 0 0 0; color: #13213c; }
  </style>
</head>
<body>
  <h1>Mascot Assets Preview</h1>
  <div class="grid">
    <div class="card">
      <img src="../src/assets/images/mascote-1.png">
      <h3>mascote-1.png</h3>
    </div>
    <div class="card">
      <img src="../src/assets/images/mascote-2.png">
      <h3>mascote-2.png</h3>
    </div>
    <div class="card">
      <img src="../src/assets/images/mascote-3.png">
      <h3>mascote-3.png</h3>
    </div>
    <div class="card">
      <img src="../src/assets/images/mascote-4.png">
      <h3>mascote-4.png</h3>
    </div>
    <div class="card">
      <img src="../src/assets/images/mascote-5.png">
      <h3>mascote-5.png</h3>
    </div>
    <div class="card">
      <img src="../src/assets/images/mascote-6.png">
      <h3>mascote-6.png</h3>
    </div>
  </div>
</body>
</html>
